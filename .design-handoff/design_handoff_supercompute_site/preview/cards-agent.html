<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .agent-card {
    background: #fff; border-radius: 10px; border: 1px solid var(--border);
    padding: 1rem;
  }
  .agent-card.hover { border-color: var(--pink); box-shadow: 0 6px 20px rgba(233,30,140,.07); transform: translateY(-2px); }
  .row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .s-active { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,.5); }
  .s-idle   { background: #FFB800; box-shadow: 0 0 6px rgba(255,184,0,.4); }
  .status { font-size: 10px; font-weight: 600; }
  .status.active { color: var(--success); }
  .status.idle   { color: var(--warning); }
  .name { font-weight: 700; color: var(--text); margin-bottom: 4px; font-size: 13px; }
  .desc { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; }
  .tag { display: inline-block; font-size: 10px; font-weight: 600; padding: .15rem .55rem; border-radius: 20px; background: rgba(233,30,140,.07); color: var(--pink); border: 1px solid rgba(233,30,140,.15); }
</style></head>
<body><div class="card-root">
  <div class="grid">
    <div class="agent-card">
      <div class="row"><span class="dot s-active"></span><span class="status active">Active</span></div>
      <div class="name">Quanta S</div>
      <div class="desc">NewsDesk intelligence + public identity on Virtuals. Your on-chain editor-in-chief.</div>
      <span class="tag">NewsDesk</span>
    </div>
    <div class="agent-card hover">
      <div class="row"><span class="dot s-idle"></span><span class="status idle">Observer</span></div>
      <div class="name">KNIGHT</div>
      <div class="desc">TradeDesk on Conway Terminal. CDP management, treasury, Polymarket ops.</div>
      <span class="tag">TradeDesk</span>
    </div>
  </div>
</div></body></html>
