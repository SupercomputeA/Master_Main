<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card {
    background: #fff; border-radius: 12px; border: 1px solid var(--border);
    padding: 1.25rem;
  }
  .card.hover { border-color: rgba(233,30,140,.35); box-shadow: 0 4px 16px rgba(233,30,140,.08); transform: translateY(-1px); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: .3rem; font-weight: 600; }
  .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--text); line-height: 1.1; }
  .stat-sub { font-size: 11px; margin-top: .3rem; color: var(--success); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 6px; }
</style></head>
<body><div class="card-root">
  <div class="grid">
    <div>
      <div class="card">
        <div class="stat-label">Portfolio Value</div>
        <div class="stat-val">8,214</div>
        <div class="stat-sub">+4.5% this week</div>
      </div>
      <div class="meta">.card · default · 12px radius</div>
    </div>
    <div>
      <div class="card hover">
        <div class="stat-label">Total Views</div>
        <div class="stat-val">8.2K</div>
        <div class="stat-sub">+12% this week</div>
      </div>
      <div class="meta">.card · :hover · pink shadow + lift</div>
    </div>
  </div>
</div></body></html>
