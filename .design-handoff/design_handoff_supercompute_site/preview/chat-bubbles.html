<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .msg { display: flex; gap: 8px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .av { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; }
  .av.ai { background: var(--grad-agent); color: #fff; border: 1px solid rgba(0,212,255,.2); }
  .av.user { background: var(--grad-brand); color: #fff; }
  .bubble { padding: .65rem .9rem; border-radius: 12px; font-size: 12px; line-height: 1.6; }
  .msg.ai .bubble { background: #fff; border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; color: var(--text); }
  .msg.user .bubble { background: var(--pink); color: #fff; border-radius: 12px 4px 12px 12px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 8px; grid-column: span 2; }
</style></head>
<body><div class="card-root">
  <div class="grid">
    <div class="msg ai">
      <div class="av ai">QS</div>
      <div class="bubble">Hey! I'm Quanta S — your on-chain intelligence agent.</div>
    </div>
    <div class="msg user">
      <div class="av user">U</div>
      <div class="bubble">Draft a thread on Base L2 fees.</div>
    </div>
    <div class="meta">.chat-msg · ai (white, asym 4/12) · user (pink, asym 12/4)</div>
  </div>
</div></body></html>
