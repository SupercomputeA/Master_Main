<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--site-bg); font-family: var(--font-mono); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .tile .swatch {
    aspect-ratio: 1.3 / 1;
    border-color: rgba(244,236,216,.10);
  }
  /* The surface tile keeps its hairline a little brighter so it doesn't
   * vanish into the page background. */
  .tile.surface .swatch { border-color: rgba(201,163,58,.30); }
  .name {
    font-size: 11px; font-weight: 700;
    color: var(--cream); margin-top: 8px;
    letter-spacing: .3px;
  }
  .role {
    font-size: 9px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--mono-blue); margin-top: 2px;
  }
  .hex {
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(244,236,216,.55);
    margin-top: 4px;
  }
</style></head>
<body class="dark"><div class="card-root">
  <div class="grid">
    <div class="tile surface">
      <div class="swatch" style="background: var(--site-bg);"></div>
      <div class="name">Navy</div>
      <div class="role">surface</div>
      <div class="hex">#0A1330</div>
    </div>
    <div class="tile">
      <div class="swatch" style="background: var(--violet);"></div>
      <div class="name">Violet</div>
      <div class="role">logo ring</div>
      <div class="hex">#7C3AED</div>
    </div>
    <div class="tile">
      <div class="swatch" style="background: var(--gold-warm);"></div>
      <div class="name">Brass</div>
      <div class="role">accent</div>
      <div class="hex">#C9A33A</div>
    </div>
    <div class="tile">
      <div class="swatch" style="background: var(--mono-blue);"></div>
      <div class="name">Mono Blue</div>
      <div class="role">body / data</div>
      <div class="hex">#6FA3E5</div>
    </div>
    <div class="tile">
      <div class="swatch" style="background: var(--cream);"></div>
      <div class="name">Cream</div>
      <div class="role">text</div>
      <div class="hex">#F4ECD8</div>
    </div>
  </div>
</div></body></html>
