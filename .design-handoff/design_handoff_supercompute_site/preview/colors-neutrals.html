<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .tile .swatch { aspect-ratio: 1.3 / 1; }
  .name { font-size: 11px; font-weight: 700; color: var(--text); margin-top: 6px; }
  .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
</style></head>
<body><div class="card-root">
  <div class="grid">
    <div class="tile"><div class="swatch" style="background: var(--bg);"></div><div class="name">Bg cream</div><div class="hex">#F8F4F0</div></div>
    <div class="tile"><div class="swatch" style="background: var(--card);"></div><div class="name">Card</div><div class="hex">#FFFFFF</div></div>
    <div class="tile"><div class="swatch" style="background: var(--border);"></div><div class="name">Border</div><div class="hex">#E5E7EB</div></div>
    <div class="tile"><div class="swatch" style="background: var(--muted);"></div><div class="name">Muted</div><div class="hex">#6B7280</div></div>
    <div class="tile"><div class="swatch" style="background: var(--text);"></div><div class="name">Text</div><div class="hex">#1A1A2E</div></div>
  </div>
</div></body></html>
