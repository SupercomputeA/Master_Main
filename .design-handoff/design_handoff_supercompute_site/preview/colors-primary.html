<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .tile .swatch { aspect-ratio: 1.4 / 1; }
  .name { font-size: 12px; font-weight: 700; color: var(--text); margin-top: 8px; }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
</style></head>
<body><div class="card-root">
  <div class="grid">
    <div class="tile">
      <div class="swatch" style="background: var(--pink);"></div>
      <div class="name">Pink</div>
      <div class="hex">#E91E8C</div>
    </div>
    <div class="tile">
      <div class="swatch" style="background: var(--gold);"></div>
      <div class="name">Gold</div>
      <div class="hex">#FFB800</div>
    </div>
    <div class="tile">
      <div class="swatch" style="background: var(--cyan);"></div>
      <div class="name">Cyan</div>
      <div class="hex">#00D4FF</div>
    </div>
    <div class="tile">
      <div class="swatch" style="background: var(--navy);"></div>
      <div class="name" style="">Navy</div>
      <div class="hex">#0A0E1A</div>
    </div>
  </div>
</div></body></html>
