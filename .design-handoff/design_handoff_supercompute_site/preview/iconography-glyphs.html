<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .stack { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ico-glyph { font-size: 22px; color: var(--text); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--pink-08); border-radius: 10px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
  .name { font-size: 11px; font-weight: 600; color: var(--text); }
</style></head>
<body><div class="card-root">
  <div class="row">
    <div class="stack"><div class="ico-glyph">⌂</div><div class="name">Home</div></div>
    <div class="stack"><div class="ico-glyph">▣</div><div class="name">Dashboard</div></div>
    <div class="stack"><div class="ico-glyph">▤</div><div class="name">Blog</div></div>
    <div class="stack"><div class="ico-glyph">◧</div><div class="name">NewsDesk</div></div>
    <div class="stack"><div class="ico-glyph">◈</div><div class="name">Trade / Agent</div></div>
    <div class="stack"><div class="ico-glyph">◉</div><div class="name">Agent Chat</div></div>
    <div class="stack"><div class="ico-glyph">◆</div><div class="name">Assets</div></div>
    <div class="stack"><div class="ico-glyph">◐</div><div class="name">Social</div></div>
    <div class="stack"><div class="ico-glyph">◑</div><div class="name">Consulting</div></div>
    <div class="stack"><div class="ico-glyph">◎</div><div class="name">Wallet / School</div></div>
    <div class="stack"><div class="ico-glyph">⌕</div><div class="name">Search</div></div>
  </div>
</div></body></html>
