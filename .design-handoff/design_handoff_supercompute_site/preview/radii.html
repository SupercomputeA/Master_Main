<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .demo {
    width: 100%; aspect-ratio: 1.5 / 1;
    background: var(--card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 11px; font-weight: 600;
  }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 6px; }
</style></head>
<body><div class="card-root">
  <div class="grid">
    <div><div class="demo" style="border-radius: 6px;">6</div><div class="meta">--r-xs · chips</div></div>
    <div><div class="demo" style="border-radius: 8px;">8</div><div class="meta">--r-sm · inputs</div></div>
    <div><div class="demo" style="border-radius: 10px;">10</div><div class="meta">--r-md · alerts</div></div>
    <div><div class="demo" style="border-radius: 12px;">12</div><div class="meta">--r-lg · cards</div></div>
    <div><div class="demo" style="border-radius: 14px;">14</div><div class="meta">--r-xl · service</div></div>
    <div><div class="demo" style="border-radius: 16px;">16</div><div class="meta">--r-2xl · token hero</div></div>
    <div><div class="demo" style="border-radius: 20px;">20</div><div class="meta">--r-3xl · modal</div></div>
    <div><div class="demo" style="border-radius: 999px;">∞</div><div class="meta">pill / circle</div></div>
  </div>
</div></body></html>
