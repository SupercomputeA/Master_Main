<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; padding-bottom: 8px; }
  .demo {
    width: 100%; aspect-ratio: 1.6 / 1;
    background: #fff; border-radius: 12px; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 11px; font-weight: 600;
  }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
</style></head>
<body><div class="card-root">
  <div class="grid">
    <div>
      <div class="demo" style="box-shadow: 0 4px 16px rgba(233,30,140,.08);">card hover</div>
      <div class="meta">sh-card-hover<br>0 4 16 · pink .08</div>
    </div>
    <div>
      <div class="demo" style="box-shadow: 0 8px 24px rgba(233,30,140,.08);">blog hover</div>
      <div class="meta">sh-blog-hover<br>0 8 24 · pink .08</div>
    </div>
    <div>
      <div class="demo" style="box-shadow: 0 12px 32px rgba(233,30,140,.10);">service hover</div>
      <div class="meta">sh-service-hover<br>0 12 32 · pink .10</div>
    </div>
  </div>
</div></body></html>
