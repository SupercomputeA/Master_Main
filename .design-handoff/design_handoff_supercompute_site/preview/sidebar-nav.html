<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--navy); }
  .nav {
    width: 100%; padding: 14px;
    background: var(--navy); color: #fff;
    border-radius: 10px; border: 1px solid var(--white-08);
  }
  .brand { display: flex; align-items: center; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--white-08); margin-bottom: 8px; }
  .av { width: 34px; height: 34px; border-radius: 50%; background: var(--grad-brand); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: #fff; }
  .brand-text { font-size: 12px; font-weight: 800; letter-spacing: .5px; }
  .brand-sub { color: var(--white-35); font-size: 9px; margin-top: 1px; }
  .section { color: var(--white-35); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; padding: 8px 4px 2px; text-transform: uppercase; }
  .item {
    display: flex; align-items: center; gap: 8px; padding: .48rem .5rem;
    color: var(--white-55); font-size: 12px; border-left: 2px solid transparent;
    border-radius: 0;
  }
  .item.active { background: rgba(233,30,140,.12); color: #fff; border-left-color: var(--pink); }
  .item .ico { width: 16px; text-align: center; flex-shrink: 0; font-size: 13px; }
  .badge { margin-left: auto; font-size: 9px; padding: .1rem .4rem; border-radius: 10px; font-weight: 700; }
  .nb-pink { background: rgba(233,30,140,.20); color: var(--pink); }
  .nb-num  { background: rgba(233,30,140,.25); color: var(--pink); }
  .nb-lock { background: rgba(255,255,255,.08); color: var(--white-35); }
</style></head>
<body class="dark"><div class="card-root">
  <div class="nav">
    <div class="brand">
      <div class="av">SC</div>
      <div>
        <div class="brand-text">SUPERCOMPUTE</div>
        <div class="brand-sub">Phase 1 · Base Chain</div>
      </div>
    </div>
    <div class="section">Member</div>
    <div class="item active"><span class="ico">▣</span><span style="flex:1;">Dashboard</span></div>
    <div class="item"><span class="ico">◧</span><span style="flex:1;">NewsDesk</span><span class="badge nb-pink">Live</span></div>
    <div class="item"><span class="ico">◈</span><span style="flex:1;">TradeDesk</span><span class="badge nb-lock">🔒</span></div>
    <div class="item"><span class="ico">◉</span><span style="flex:1;">Agent Chat</span><span class="badge nb-num">2</span></div>
  </div>
</div></body></html>
