<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
  .stack { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
  .box { background: var(--pink-08); border: 1px dashed rgba(233,30,140,.4); border-radius: 4px; }
</style></head>
<body><div class="card-root">
  <div class="row">
    <div class="stack"><div class="box" style="width:4px;height:32px;"></div><div class="label">4 · s-1</div></div>
    <div class="stack"><div class="box" style="width:8px;height:32px;"></div><div class="label">8 · s-2</div></div>
    <div class="stack"><div class="box" style="width:12px;height:32px;"></div><div class="label">12 · s-3</div></div>
    <div class="stack"><div class="box" style="width:16px;height:32px;"></div><div class="label">16 · s-4</div></div>
    <div class="stack"><div class="box" style="width:20px;height:32px;"></div><div class="label">20 · s-5</div></div>
    <div class="stack"><div class="box" style="width:24px;height:32px;"></div><div class="label">24 · s-6</div></div>
    <div class="stack"><div class="box" style="width:32px;height:32px;"></div><div class="label">32 · s-8</div></div>
    <div class="stack"><div class="box" style="width:40px;height:32px;"></div><div class="label">40 · s-10</div></div>
    <div class="stack"><div class="box" style="width:48px;height:32px;"></div><div class="label">48 · s-12</div></div>
  </div>
</div></body></html>
