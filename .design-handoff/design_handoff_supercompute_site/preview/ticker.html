<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .ticker { background: var(--navy); border-radius: 10px; overflow: hidden; white-space: nowrap; padding: 10px 0; }
  .inner { display: inline-flex; animation: scroll 40s linear infinite; }
  .item { display: inline-flex; align-items: center; gap: 5px; padding: 0 24px; font-size: 11px; color: rgba(255,255,255,.55); }
  .sym { font-weight: 700; color: rgba(255,255,255,.8); }
  .up   { color: #4ade80; }
  .down { color: #f87171; }
  .sep  { color: rgba(255,255,255,.15); margin: 0 8px; }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 8px; }
</style></head>
<body><div class="card-root">
  <div class="ticker">
    <div class="inner">
      <span class="item"><span class="sym">ETH</span> 1,978.50 <span class="up">+3.05%</span><span class="sep">|</span></span>
      <span class="item"><span class="sym">BTC</span> 61,890 <span class="down">-0.82%</span><span class="sep">|</span></span>
      <span class="item"><span class="sym">BASE</span> 0.1842 <span class="up">+1.4%</span><span class="sep">|</span></span>
      <span class="item"><span class="sym">$QUANTA</span> — <span class="up">Coming</span><span class="sep">|</span></span>
      <span class="item"><span class="sym">$SCOM</span> — <span class="up">Q3 2026</span><span class="sep">|</span></span>
      <span class="item"><span class="sym">ETH</span> 1,978.50 <span class="up">+3.05%</span><span class="sep">|</span></span>
      <span class="item"><span class="sym">BTC</span> 61,890 <span class="down">-0.82%</span><span class="sep">|</span></span>
      <span class="item"><span class="sym">BASE</span> 0.1842 <span class="up">+1.4%</span><span class="sep">|</span></span>
    </div>
  </div>
  <div class="meta">.ticker-wrap · 40s linear infinite · navy bg</div>
</div></body></html>
