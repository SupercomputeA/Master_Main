<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { margin-bottom: 14px; }
  .eb { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .eb.pink { color: var(--pink); }
  .eb.cyan { color: var(--cyan-2); }
  .eb.tracked { letter-spacing: 2px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 4px; }
  .wm { font-weight: 900; letter-spacing: 1.2px; font-size: 16px; color: var(--text); }
</style></head>
<body><div class="card-root">
  <div class="row"><div class="eb pink">Services</div><div class="meta">Eyebrow · 10px · pink · tracked +1.5</div></div>
  <div class="row"><div class="eb cyan tracked">Active Autonomous Agents</div><div class="meta">Stat label · 10px · cyan · tracked +2</div></div>
  <div class="row"><div class="eb">Recent Activity</div><div class="meta">Section · 10px · muted · tracked +1</div></div>
  <div class="row"><div class="wm">SUPERCOMPUTE</div><div class="meta">Wordmark · 900 · uppercase · tracked +1.2</div></div>
</div></body></html>
