<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supercompute · App UI Kit (Terminal Blue)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Components2.jsx"></script>
<script type="text/babel">
const { useState } = React;
function App(){
  const [signedIn, setSignedIn] = useState(true);
  const [role, setRole]         = useState('admin');
  const [active, setActive]     = useState('dashboard');
  const [wallet]                = useState('0x4a…f2c');

  const page =
    active === 'dashboard'                                ? <Dashboard /> :
    active === 'newsdesk' || active === 'blog'            ? <NewsDesk />  :
    active === 'agentchat'                                ? <AgentChat /> :
    active === 'web3school'                               ? <School />    :
    active === 'token'                                    ? <TokenPage /> :
    active === 'agentfleet'                               ? <AgentFleet /> :
                                                            <Dashboard />;
  return (
    <React.Fragment>
      <HudFrame />
      <div className="shell">
        <Sidebar
          active={active}
          onNav={setActive}
          role={role}
          signedIn={signedIn}
          wallet={wallet}
        />
        <div className="main">{page}</div>
      </div>
      {!signedIn && (
        <AuthOverlay onSignIn={r => {
          setSignedIn(true);
          setRole(r);
          setActive(r === 'admin' ? 'dashboard' : 'agentchat');
        }} />
      )}
      {signedIn && (
        <div className="role-switcher">
          <span className="rs-label">// demo · role</span>
          {['admin','member','student','investor','public'].map(r => (
            <button
              key={r}
              className={`rs-btn ${role === r ? 'active' : ''}`}
              onClick={() => setRole(r)}>{r}</button>
          ))}
        </div>
      )}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
