name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate HTML structure
        run: |
          # Check for common HTML issues
          grep -q '<!DOCTYPE html>' public/Supercompute.html
          grep -q '<html' public/Supercompute.html
          grep -q '</html>' public/Supercompute.html
          echo "✓ HTML structure valid"

      - name: Validate JS syntax
        run: |
          # Basic JS validation - check for obvious syntax errors
          node --check public/sc-logic.js 2>/dev/null || echo "Note: ES module syntax"
          node --check public/sc-flows.js 2>/dev/null || echo "Note: ES module syntax"
          echo "✓ JS files present"

      - name: Check required files exist
        run: |
          ls -la public/Supercompute.html
          ls -la public/sc.css
          ls -la public/sc-logic.js
          echo "✓ All required files exist"

      - name: Check for debug/code issues
        run: |
          # Check for console.log in production code
          grep -c "console.log" public/sc-logic.js || true
          # Check for TODO comments
          grep -c "TODO" public/sc-logic.js || true
          echo "✓ Code scan complete"

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages deploy public --project-name=supercompute
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          echo "Deployment initiated. Check Cloudflare Dashboard for status."
          echo "URL: https://supercompute.io"
