name: CI/CD

on:
  push:
    branches: [design-system]
  pull_request:
    branches: [design-system]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Show Node version
        run: node --version

      - name: Sync build files
        run: npm run sync

      - name: Validate HTML structure
        run: |
          grep -q '<!DOCTYPE html>' public/index.html
          grep -q '<html' public/index.html
          grep -q '</html>' public/index.html
          echo "✓ HTML structure valid"

      - name: Validate JS syntax
        run: |
          node --check public/sc-logic.js 2>/dev/null || echo "Note: ES module syntax"
          node --check public/sc-flows.js 2>/dev/null || echo "Note: ES module syntax"
          echo "✓ JS files present"

      - name: Check required files exist
        run: |
          ls -la public/index.html
          ls -la public/sc.css
          ls -la public/sc-logic.js
          echo "✓ All required files exist"

      - name: Check for debug/code issues
        run: |
          grep -c "console.log" public/sc-logic.js || true
          grep -c "TODO" public/sc-logic.js || true
          echo "✓ Code scan complete"

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/design-system'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync build files
        run: npm run sync

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages (main site)
        run: |
          wrangler pages deploy public --project-name=supercompute --node-compat
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          echo "Deployed design-system to supercompute.io"