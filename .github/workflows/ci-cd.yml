name: CI/CD

on:
  push:
    branches: [main, staging, development]
  pull_request:
    branches: [main, staging]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Show Node version
        run: node --version

      - name: Build Tina CMS admin
        run: npx tinacms build
        env:
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ vars.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          TINA_BRANCH: ${{ github.ref_name }}
        continue-on-error: true

      - name: Build Next.js static export
        run: npx next build
        env:
          NEXT_PUBLIC_WALLET_CONNECT_ID: ${{ secrets.NEXT_PUBLIC_WALLET_CONNECT_ID }}
          NEXT_PUBLIC_NEYNAR_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_NEYNAR_CLIENT_ID }}
          NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN }}
          NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN }}
          NEXT_PUBLIC_MOONPAY_KEY: ${{ secrets.NEXT_PUBLIC_MOONPAY_KEY }}
          NEXT_PUBLIC_TRANSAK_KEY: ${{ secrets.NEXT_PUBLIC_TRANSAK_KEY }}

      - name: Verify build output
        run: |
          ls -la out/ | head -10
          test -f out/index.html && echo "✓ out/index.html exists"
          test -f out/about.html && echo "✓ out/about.html exists"
          test -f out/storefront.html && echo "✓ out/storefront.html exists"
          echo "✓ Next.js export complete"

      - name: Check for debug/code issues
        run: |
          echo "TODO count: $(grep -rc 'TODO' pages/ components/ lib/ 2>/dev/null | wc -l)" || true
          echo "✓ Code scan complete"

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/development'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Tina CMS admin
        run: npx tinacms build
        env:
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ vars.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          TINA_BRANCH: ${{ github.ref_name }}
        continue-on-error: true

      - name: Build Next.js static export
        run: npx next build
        env:
          NEXT_PUBLIC_WALLET_CONNECT_ID: ${{ secrets.NEXT_PUBLIC_WALLET_CONNECT_ID }}
          NEXT_PUBLIC_NEYNAR_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_NEYNAR_CLIENT_ID }}
          NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN }}
          NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN }}
          NEXT_PUBLIC_MOONPAY_KEY: ${{ secrets.NEXT_PUBLIC_MOONPAY_KEY }}
          NEXT_PUBLIC_TRANSAK_KEY: ${{ secrets.NEXT_PUBLIC_TRANSAK_KEY }}

      - name: Copy Functions into deploy root
        run: |
          cp -r functions out/functions
          echo "✓ Functions copied to out/functions/"

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare Pages (production)
        if: github.ref == 'refs/heads/main'
        run: |
          wrangler pages deploy out --project-name=supercompute --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (staging)
        if: github.ref == 'refs/heads/staging'
        run: |
          wrangler pages deploy out --project-name=supercompute --branch staging --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (development)
        if: github.ref == 'refs/heads/development'
        run: |
          wrangler pages deploy out --project-name=supercompute --branch development --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          echo "Deployed supercompute website to supercompute.pages.dev (${{ github.ref_name }})"
