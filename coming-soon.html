<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coming Soon · SUPERCOMPUTE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #ec4899;
      --border: #1e293b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(236, 72, 153, 0.1);
      border: 1px solid rgba(236, 72, 153, 0.3);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-family: 'SF Pro Display', -apple-system, sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      line-height: 1;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    .contact {
      font-size: 14px;
      color: var(--muted);
    }

    .contact a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .contact a:hover {
      border-color: var(--accent);
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status">
      <span class="dot"></span>
      BUILDING
    </div>
    <h1>SUPER<span>COMPUTE</span></h1>
    <p class="subtitle">Something powerful is on the way.<br>Operator-grade compute infrastructure for the on-chain era.</p>
    <p class="contact">Questions? <a href="mailto:supercompute@proton.me">supercompute@proton.me</a></p>
  </div>
  <div class="footer">Phase 1 · Base Chain · 2026</div>
</body>
</html>
