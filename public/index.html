<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Supercompute · Hands-on Web3 Consulting on Base Chain</title>
<meta name="description" content="Hands-on Web3 consulting on Base Chain. One operator, thirteen agents. Tokenomics, agent buildout, treasury, and OpSec for founders.">
<link rel="icon" type="image/png" href="SupercomputeLogo.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap">
<style>
@font-face {
  font-family: 'Phosphate';
  src: url('fonts/PhosphateSolid.ttf') format('truetype');
  font-weight: 400 900;
  font-style: normal;
  font-display: swap;
}
:root {
  --site-bg:#0a1330;--gold-warm:#C9A33A;--gold-warm-2:#b8902c;
  --cream:#F4ECD8;--mono-blue:#6FA3E5;--hud-yellow:#E0BE3F;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:var(--site-bg);color:var(--cream);
  font-family:var(--font-mono);font-size:14px;line-height:1.7;
  min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(0deg,rgba(255,255,255,.030) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.030) 1px,transparent 1px);
  background-size:56px 56px;
}
body::after{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0,rgba(0,0,0,.18) 1px,transparent 1px,transparent 3px);
  mix-blend-mode:multiply;opacity:.65;
}
.vignette{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%);
}
#root{position:relative;z-index:2}
.hud-corner{
  position:fixed;width:32px;height:32px;
  border:2px solid var(--hud-yellow);z-index:4;pointer-events:none;
}
.hud-corner.tl{top:18px;left:18px;border-right:none;border-bottom:none}
.hud-corner.tr{top:18px;right:18px;border-left:none;border-bottom:none}
.hud-corner.bl{bottom:18px;left:18px;border-right:none;border-top:none}
.hud-corner.br{bottom:18px;right:18px;border-left:none;border-top:none}
.topnav{
  display:flex;align-items:center;gap:32px;padding:32px 72px;
  border-bottom:1px solid rgba(244,236,216,.10);position:relative;z-index:3;
}
.topnav-brand{display:flex;align-items:center;gap:14px}
.topnav-brand img{width:40px;height:40px;border-radius:50%;filter:drop-shadow(0 0 16px rgba(255,184,0,.35))}
.topnav-brand-mark{font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:3.5px;color:var(--gold-warm);text-transform:uppercase}
.topnav-brand-mark .dim{color:var(--mono-blue);opacity:.7}
.topnav-links{display:flex;gap:32px;margin-left:16px}
.topnav-link{
  font-family:var(--font-mono);font-weight:500;font-size:14px;letter-spacing:1px;
  color:var(--cream);text-decoration:none;cursor:pointer;
  padding-bottom:4px;border-bottom:1px solid transparent;
  transition:border-color .15s,color .15s;
}
.topnav-link:hover,.topnav-link.active{border-bottom-color:var(--gold-warm);color:var(--gold-warm)}
.topnav-link .slash{color:var(--mono-blue);opacity:.6}
.cmd-btn{
  margin-left:auto;display:inline-flex;align-items:center;gap:10px;
  padding:12px 20px;background:transparent;border:1px solid var(--gold-warm);
  color:var(--gold-warm);font-family:var(--font-mono);font-weight:700;
  font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .15s;
  text-transform:lowercase;position:relative;z-index:3;
}
.cmd-btn:hover{background:var(--gold-warm);color:#1a1303}
.cmd-btn .prompt{color:var(--mono-blue)}
.cmd-btn.solid{background:var(--gold-warm);color:#1a1303}
.cmd-btn.solid .prompt{color:rgba(26,19,3,.55)}
.cmd-btn.solid:hover{background:#e0b94a}
.cmd-btn.ghost{color:var(--cream);border-color:rgba(244,236,216,.30)}
.cmd-btn.ghost:hover{border-color:var(--cream);background:rgba(244,236,216,.04);color:var(--cream)}
.wrap{max-width:1200px;margin:0 auto;padding:0 72px}
.section{padding:96px 0;border-bottom:1px solid rgba(244,236,216,.08);position:relative;z-index:2}
.section:last-child{border-bottom:none}
.prompt-line{display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:13px;color:var(--mono-blue);margin-bottom:32px;letter-spacing:.5px}
.prompt-line .caret{width:8px;height:16px;background:var(--gold-warm);animation:blink-caret 1.1s steps(1) infinite}
@keyframes blink-caret{50%{opacity:0}}
.prompt-line .cmd{color:var(--cream);font-weight:500}
.prompt-line .cmd .gold{color:var(--gold-warm)}
.hero{padding:80px 0 120px}
.hero-output{font-family:var(--font-mono);display:grid;grid-template-columns:140px 1fr;gap:14px 28px;margin-bottom:40px;font-size:32px;line-height:1.45;letter-spacing:-.2px}
.hero-output .k{color:var(--gold-warm);font-weight:700;font-size:14px;letter-spacing:2px;text-transform:uppercase;padding-top:14px}
.hero-output .v{color:var(--cream);font-weight:500}
.hero-output .v em{font-style:normal;color:var(--mono-blue)}
.hero-body{font-family:var(--font-mono);font-size:16px;line-height:1.85;color:var(--mono-blue);max-width:640px;margin-bottom:48px}
.hero-body strong{color:var(--cream);font-weight:600}
.hero-ctas{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:56px}
.hero-ctas .cmd-btn{font-size:14px;padding:14px 22px;margin-left:0}
.sheet{background:rgba(255,255,255,.02);border:1px solid rgba(244,236,216,.10);padding:28px 32px}
.sheet-row{display:grid;grid-template-columns:32px 1fr auto;gap:16px 24px;align-items:center;padding:14px 0;border-bottom:1px dashed rgba(244,236,216,.08);font-family:var(--font-mono)}
.sheet-row:last-child{border-bottom:none}
.sheet-row .num{color:var(--gold-warm);font-weight:700;font-size:14px}
.sheet-row .body{display:flex;flex-direction:column;gap:4px}
.sheet-row .body .name{font-size:16px;color:var(--cream);font-weight:600;letter-spacing:.2px}
.sheet-row .body .desc{font-size:13px;color:var(--mono-blue);line-height:1.6}
.sheet-row .price{font-size:16px;font-weight:700;color:var(--gold-warm);font-variant-numeric:tabular-nums;text-align:right}
.sheet-row .price .unit{font-size:12px;color:var(--mono-blue);margin-left:4px;font-weight:500}
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(244,236,216,.10);border:1px solid rgba(244,236,216,.10)}
.proj-cell{background:var(--site-bg);padding:24px 28px;font-family:var(--font-mono);display:flex;flex-direction:column;gap:10px}
.proj-cell .head{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--gold-warm);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.proj-cell .head .dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;box-shadow:0 0 6px rgba(74,222,128,.5)}
.proj-cell .head .dot.idle{background:var(--gold-warm);box-shadow:0 0 6px rgba(201,163,58,.4)}
.proj-cell .title{font-size:18px;color:var(--cream);font-weight:600}
.proj-cell .meta{font-size:12px;color:var(--mono-blue);line-height:1.6}
.proj-cell .meta strong{color:var(--cream)}
.proj-cell .link{font-size:12px;color:var(--cream);border-bottom:1px solid rgba(244,236,216,.20);align-self:flex-start;padding-bottom:2px;margin-top:6px;cursor:pointer;transition:border-color .15s,color .15s}
.proj-cell .link:hover{color:var(--gold-warm);border-bottom-color:var(--gold-warm)}
.founder{display:grid;grid-template-columns:180px 1fr auto;gap:40px;align-items:center;padding:32px 40px;border:1px solid rgba(244,236,216,.10);background:rgba(255,255,255,.02)}
.founder-photo{width:180px;height:180px;background:radial-gradient(circle at 30% 30%,rgba(255,184,0,.20),transparent 60%),linear-gradient(135deg,#1a2235,#0a1330);border:1px solid rgba(244,236,216,.15);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--mono-blue);letter-spacing:1.5px}
.founder-photo .label{opacity:.5}
.founder-meta{font-family:var(--font-mono)}
.founder-meta .name{font-size:22px;color:var(--cream);font-weight:600;margin-bottom:6px;letter-spacing:.3px}
.founder-meta .role{font-size:13px;color:var(--gold-warm);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.founder-meta .bio{font-size:14px;color:var(--mono-blue);line-height:1.85;max-width:540px}
.founder-meta .principles{display:flex;gap:18px;margin-top:18px;flex-wrap:wrap}
.founder-meta .principle{font-size:11px;color:var(--cream);border-left:2px solid var(--gold-warm);padding-left:10px;letter-spacing:.5px}
.feed-row{display:grid;grid-template-columns:100px 1fr auto;gap:24px;align-items:center;padding:22px 0;border-bottom:1px dashed rgba(244,236,216,.08);font-family:var(--font-mono)}
.feed-row:last-child{border-bottom:none}
.feed-row .cat{font-size:11px;color:var(--gold-warm);font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.feed-row .title{font-size:16px;color:var(--cream);font-weight:500;line-height:1.5}
.feed-row .title:hover{color:var(--gold-warm);cursor:pointer}
.feed-row .meta{font-size:12px;color:var(--mono-blue);text-align:right}
.footer{padding:56px 72px 96px;border-top:1px solid rgba(244,236,216,.08);position:relative;z-index:2}
.footer-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:56px}
.footer-brand-block{display:flex;flex-direction:column;gap:14px}
.footer-brand{display:flex;align-items:center;gap:12px}
.footer-brand img{width:36px;height:36px;border-radius:50%}
.footer-brand .mark{font-family:var(--font-mono);font-weight:700;font-size:13px;letter-spacing:3px;color:var(--gold-warm);text-transform:uppercase}
.footer-tag{font-family:var(--font-mono);font-size:13px;line-height:1.7;color:var(--mono-blue);max-width:320px}
.footer-col h4{font-family:var(--font-mono);font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-warm);margin-bottom:18px}
.footer-col a{display:block;font-family:var(--font-mono);font-size:14px;color:var(--cream);text-decoration:none;padding:5px 0;opacity:.75;transition:opacity .15s,color .15s;cursor:pointer}
.footer-col a:hover{opacity:1;color:var(--gold-warm)}
.footer-bottom{max-width:1200px;margin:56px auto 0;padding-top:24px;border-top:1px solid rgba(244,236,216,.08);font-family:var(--font-mono);font-size:12px;color:var(--mono-blue);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-bottom .right{color:var(--gold-warm)}
@media(max-width:980px){
  .topnav{padding:24px 32px;flex-wrap:wrap;gap:16px}
  .topnav-links{margin-left:0;gap:20px;order:3;width:100%;padding-top:12px;border-top:1px solid rgba(244,236,216,.10)}
  .cmd-btn{margin-left:auto}
  .wrap{padding:0 32px}
  .section{padding:64px 0}
  .hero-output{grid-template-columns:1fr;gap:4px 0;font-size:24px}
  .hero-output .k{padding-top:18px}
  .proj-grid,.founder{grid-template-columns:1fr}
  .founder-photo{width:100%;height:220px}
  .footer-inner{grid-template-columns:1fr 1fr;gap:32px}
  .feed-row{grid-template-columns:1fr;gap:6px}
  .feed-row .meta{text-align:left}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState } = React;

const NAV_LINKS = [
  { id:'home',label:'~/' },
  { id:'consulting',label:'~/services' },
  { id:'projects',label:'~/work' },
  { id:'school',label:'~/school' },
  { id:'newsdesk',label:'~/news' },
  { id:'about',label:'~/about' },
];

const SERVICES = [
  { n:'01',name:'defi_onboarding.sh',desc:'Wallet setup, hardware key, OpSec. From zero to self-custody in 90 minutes.',price:'$200',unit:'· 90 min' },
  { n:'02',name:'agent_buildout.sh',desc:'Build a Quanta-style autonomous agent for your protocol. Strategy + delivery.',price:'from $500' },
  { n:'03',name:'token_launch.sh',desc:'End-to-end playbook. Tokenomics, contracts on Base, post-launch ops.',price:'from $3,500' },
  { n:'04',name:'refi_strategy.sh',desc:'Treasury, runway, regenerative tokenomics for impact-aligned protocols.',price:'$400',unit:'· 2 hr' },
];

const PROJECTS = [
  { tag:'TOKEN',status:'funded',title:'NewsDesk',meta:['Token launch','$52K raised','684 backers'] },
  { tag:'AGENT',status:'shipped',title:'KNIGHT Open-Source',meta:['Agent build-out','TradeDesk shipped May 2026'] },
  { tag:'TREASURY',status:'ops',title:'Bracket Studio',meta:['DAO treasury','$1.2M under ops','0 incidents'] },
  { tag:'MIGRATION',status:'shipped',title:'Spool Protocol',meta:['L1 → Base migration','48-hour cutover'] },
];

const NEWS = [
  { cat:'sovereignty',title:'SIWE Auth and the End of Password Logins',meta:'Apr 28 · 7 min' },
  { cat:'dispatch',title:'Phase 1 Dispatch — What Shipped This Week',meta:'Apr 22 · 4 min' },
  { cat:'intelligence',title:'The Cyborg Agency: 1 Human + 13 Agents',meta:'Apr 12 · 6 min' },
];

const SCHOOL = [
  { n:'01',name:'wallets_and_self_custody.md',desc:'Hardware keys, seed phrases, recovery. 12 lessons.',free:true },
  { n:'02',name:'l1_vs_l2_base.md',desc:'Rollups, gas economics, sequencer trust.',free:true },
  { n:'03',name:'defi_primitives.md',desc:'AMMs, lending, CDPs.',price:'$80' },
  { n:'04',name:'opsec_hardware_keys.md',desc:'YubiKey, Ledger, multisig basics.',price:'$80' },
];

function App() {
  const [active,setActive] = useState('home');
  return (
    <>
      <div className="vignette"/>
      <div className="hud-corner tl"/><div className="hud-corner tr"/>
      <div className="hud-corner bl"/><div className="hud-corner br"/>
      <nav className="topnav">
        <div className="topnav-brand">
          <img src="sc-logo.jpg" alt="Supercompute"/>
          <span className="topnav-brand-mark">Supercompute<span className="dim">.io</span></span>
        </div>
        <div className="topnav-links">
          {NAV_LINKS.map(l=>(
            <a key={l.id} className={'topnav-link'+(l.id===active?' active':'')} onClick={()=>setActive(l.id)}>{l.label}</a>
          ))}
        </div>
        <button className="cmd-btn solid" onClick={()=>window.open('https://calendly.com/ora_mi','_blank')}>
          <span className="prompt">$</span>book --call
        </button>
      </nav>
      <section className="hero">
        <div className="wrap">
          <div className="prompt-line">
            <span>$</span><span className="cmd">whoami</span><span className="caret"/>
          </div>
          <div className="hero-output">
            <span className="k">[ name ]</span>
            <span className="v">Supercompute<em> — hands-on web3 operator</em></span>
            <span className="k">[ since ]</span>
            <span className="v">2013<em> · Occupy LA → Base L2</em></span>
            <span className="k">[ stack ]</span>
            <span className="v">Base · Virtuals · Cloudflare · Ledger</span>
            <span className="k">[ status ]</span>
            <span className="v">Booking strategy calls<em> · May 2026</em></span>
          </div>
          <p className="hero-body">
            I work directly with founders launching projects on Base.
            <strong> No anonymous team. No "platform". </strong>
            One operator, hands on the keyboard — tokenomics, agents, OpSec,
            treasury, community ops. Values in order. Pro expansion.
          </p>
          <div className="hero-ctas">
            <button className="cmd-btn solid" onClick={()=>window.open('https://calendly.com/ora_mi','_blank')}>
              <span className="prompt">$</span>book --strategy-call
            </button>
            <button className="cmd-btn ghost">
              <span className="prompt">$</span>ls ./work
            </button>
          </div>
        </div>
      </section>
      <section className="section">
        <div className="wrap">
          <div className="prompt-line">
            <span>$</span><span className="cmd">./services <span className="gold">--list</span></span>
          </div>
          <div className="sheet">
            {SERVICES.map(s=>(
              <div key={s.n} className="sheet-row">
                <span className="num">{s.n}</span>
                <div className="body">
                  <span className="name">{s.name}</span>
                  <span className="desc">{s.desc}</span>
                </div>
                <span className="price">{s.price}{s.unit&&<span className="unit">{s.unit}</span>}</span>
              </div>
            ))}
          </div>
        </div>
      </section>
      <section className="section">
        <div className="wrap">
          <div className="prompt-line">
            <span>$</span><span className="cmd">./projects <span className="gold">--recent</span> | head -4</span>
          </div>
          <div className="proj-grid">
            {PROJECTS.map(p=>(
              <div key={p.title} className="proj-cell">
                <div className="head">
                  <span className={'dot'+(p.status==='ops'?' idle':'')}/>
                  {p.tag} · {p.status}
                </div>
                <div className="title">{p.title}</div>
                <div className="meta">
                  {p.meta.map((m,i)=>(
                    <React.Fragment key={i}>{i>0&&' · '}<strong>{m}</strong></React.Fragment>
                  ))}
                </div>
                <a className="link">cat ./case-study →</a>
              </div>
            ))}
          </div>
        </div>
      </section>
      <section className="section">
        <div className="wrap">
          <div className="prompt-line">
            <span>$</span><span className="cmd">cat ./operator.md</span>
          </div>
          <div className="founder">
            <div className="founder-photo"><span className="label">[ founder photo ]</span></div>
            <div className="founder-meta">
              <div className="role">Operator since 2013</div>
              <div className="name">Hands-on, values in order, pro expansion.</div>
              <p className="bio">
                I started in 2013 — Occupy LA, early DeFi, the long winter.
                Fourteen projects shipped since. I don't outsource the work that
                matters; if you hire me, I'm the one on the keyboard. I help
                founders launch tokens and agents on Base with OpSec that
                actually holds.
              </p>
              <div className="principles">
                <span className="principle">Hands-on</span>
                <span className="principle">Values in order</span>
                <span className="principle">Pro expansion</span>
              </div>
            </div>
            <button className="cmd-btn ghost"><span className="prompt">$</span>read --more</button>
          </div>
        </div>
      </section>
      <section className="section">
        <div className="wrap">
          <div className="prompt-line">
            <span>$</span><span className="cmd">./newsdesk <span className="gold">--latest</span></span>
          </div>
          <div className="sheet">
            {NEWS.map(n=>(
              <div key={n.title} className="feed-row">
                <span className="cat">[ {n.cat} ]</span>
                <span className="title">{n.title}</span>
                <span className="meta">{n.meta}</span>
              </div>
            ))}
          </div>
          <div style={{marginTop:28}}>
            <button className="cmd-btn ghost"><span className="prompt">$</span>subscribe --newsdesk</button>
          </div>
        </div>
      </section>
      <section className="section">
        <div className="wrap">
          <div className="prompt-line">
            <span>$</span><span className="cmd">./school <span className="gold">--curriculum</span></span>
          </div>
          <div className="sheet">
            {SCHOOL.map(s=>(
              <div key={s.n} className="sheet-row">
                <span className="num">{s.n}</span>
                <div className="body">
                  <span className="name">{s.name}</span>
                  <span className="desc">{s.desc}</span>
                </div>
                <span className="price">
                  {s.free?<span className="unit" style={{color:'#4ADE80',fontWeight:700}}>FREE</span>:s.price}
                </span>
              </div>
            ))}
          </div>
          <div style={{marginTop:28}}>
            <button className="cmd-btn ghost"><span className="prompt">$</span>./school --enroll</button>
          </div>
        </div>
      </section>
      <section className="section" style={{textAlign:'center',paddingTop:64,paddingBottom:64}}>
        <div className="wrap">
          <div className="prompt-line" style={{justifyContent:'center',marginBottom:20}}>
            <span>$</span><span className="cmd">./ready --book</span>
          </div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:28,color:'var(--cream)',lineHeight:1.4,marginBottom:14,letterSpacing:'.2px'}}>
            Thirty minutes. <span style={{color:'var(--gold-warm)'}}>No pitch.</span>
          </div>
          <p style={{fontFamily:'var(--font-mono)',fontSize:14,color:'var(--mono-blue)',maxWidth:520,margin:'0 auto 32px',lineHeight:1.85}}>
            You bring a problem. I bring 13 years of crypto experience and a
            notebook. If we're a fit, we work together. If not, you leave with notes.
          </p>
          <button className="cmd-btn solid" style={{marginLeft:0,fontSize:14,padding:'14px 26px'}} onClick={()=>window.open('https://calendly.com/ora_mi','_blank')}>
            <span className="prompt">$</span>book --strategy-call
          </button>
        </div>
      </section>
      <footer className="footer">
        <div className="footer-inner">
          <div className="footer-brand-block">
            <div className="footer-brand">
              <img src="sc-logo.jpg" alt=""/>
              <span className="mark">Supercompute.io</span>
            </div>
            <p className="footer-tag">One operator. Hands-on Web3 consulting on Base Chain since 2013.</p>
          </div>
          <div className="footer-col">
            <h4>Practice</h4>
            <a>Consulting</a><a>Recent work</a><a>About</a><a>Contact</a>
          </div>
          <div className="footer-col">
