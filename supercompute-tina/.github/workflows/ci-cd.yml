name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Show Node version
        run: node --version

      - name: Build
        run: npm run build

      - name: Validate build output
        run: |
          test -f out/index.html
          test -d out/_next/
          echo "✓ Build output valid"

      - name: Validate HTML structure
        run: |
          grep -q '<!DOCTYPE html>' out/index.html
          grep -q '<html' out/index.html
          grep -q '</html>' out/index.html
          echo "✓ HTML structure valid"

      - name: Check no internal content leaks
        run: |
          ! grep -rq "credential watchdog\|agent-fleet-update\|infisical\|coinbase" out/ || { echo "LEAK DETECTED"; exit 1; }
          echo "✓ No sensitive content in build"

      - name: CI validation complete
        run: echo "✓ CI validation complete"

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=supercompute
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          echo "Deployment complete."
          echo "URL: https://supercompute.io"