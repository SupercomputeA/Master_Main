fragment PostParts on Post {
  __typename
  title
  slug
  category
  author
  date
  excerpt
  access
  status
  body
  kgQuery
  seo {
    __typename
    title
    description
    keywords
    ogImage
  }
  knowledgeGraph {
    __typename
    nodes {
      __typename
      id
      label
      type
      description
      definition
      datetime
      location
      src
      alt
      order
      prompt
    }
    edges {
      __typename
      from
      to
      label
      weight
    }
    presets {
      __typename
      id
      label
      description
      filters
      highlightIds
      focusNodeId
    }
    narratives {
      __typename
      id
      title
      description
      steps
    }
  }
  protocolEval {
    __typename
    protocol
    chain
    tvl
    riskScore
    audit
    recommendation
    category
    auditedBy
    launchDate
  }
}

fragment ServiceParts on Service {
  __typename
  title
  description
  price
  duration
}

fragment ProjectParts on Project {
  __typename
  title
  type
  detail
  status
}

fragment AgentParts on Agent {
  __typename
  title
  role
  status
  description
}

fragment SchoolModuleParts on SchoolModule {
  __typename
  title
  duration
  free
}
