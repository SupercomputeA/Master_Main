fragment PostParts on Post {
  __typename
  title
  slug
  category
  author
  date
  excerpt
  access
  status
  body
  kgQuery
  seo {
    __typename
    title
    description
    keywords
    ogImage
  }
  knowledgeGraph {
    __typename
    nodes {
      __typename
      id
      label
      type
    }
    edges {
      __typename
      from
      to
      label
    }
  }
  protocolEval {
    __typename
    protocol
    chain
    tvl
    riskScore
    audit
    recommendation
    category
    auditedBy
    launchDate
  }
}

fragment ServiceParts on Service {
  __typename
  title
  description
  price
  duration
}

fragment ProjectParts on Project {
  __typename
  title
  type
  detail
  status
}

fragment AgentParts on Agent {
  __typename
  title
  role
  status
  description
}

fragment SchoolModuleParts on SchoolModule {
  __typename
  title
  duration
  free
}
