name = "supercompute"
compatibility_date = "2026-04-30"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "out"

[[d1_databases]]
binding = "DB"
database_name = "supercompute-db"
database_id = "e3c7c7f9-df4a-4e1b-9bc7-97f1faadf282"

[[kv_namespaces]]
binding = "CACHE"
id = "031b7cbbfed44d478d7d7c4abe67c666"

[vars]
CORS_ORIGIN = "https://supercompute.io"
QUANTA_TOKEN = "0x5ACDC563450cC35055d7344287C327fafB2b371A"
# SCOM_STAKING — not deployed yet; zero-address makes staking API return defaults
SCOM_STAKING = "0x0000000000000000000000000000000000000000"
# Uniswap V4 Quoter on Base — not deployed yet; zero-address falls back to simulated quote
UNISWAP_QUOTER = "0x0000000000000000000000000000000000000000"

# NOTE: Cloudflare Pages only supports the named environments "preview" and
# "production" — a custom [env.staging] block fails Pages config validation and
# breaks every `wrangler pages deploy` from this directory. Staging is therefore
# done as a preview-branch deployment of this same project (see the
# `deploy:staging` script in package.json), which yields a
# <branch>.supercompute.pages.dev URL without a separate project or env block.
